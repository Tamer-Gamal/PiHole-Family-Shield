# ============================================================================
#  Unbound configuration for Pi-hole  >  /etc/unbound/unbound.conf.d/pi-hole.conf
# ----------------------------------------------------------------------------
#  Makes this Pi its OWN recursive DNS resolver: instead of asking Cloudflare
#  or Google, it talks directly to the internet's root/authoritative servers.
#  Nobody upstream gets to log your browsing. Pi-hole then uses  127.0.0.1#5335
#  as its only upstream. install-unbound.sh puts this file in place for you.
# ============================================================================
server:
    # Listen only on the Pi itself, on port 5335 (Pi-hole talks to it here).
    verbosity: 0
    interface: 127.0.0.1
    port: 5335
    do-ip4: yes
    do-udp: yes
    do-tcp: yes

    # Prefer IPv4 (most home networks); flip to yes if your ISP gives real IPv6.
    do-ip6: no
    prefer-ip6: no

    # Trust the DNSSEC chain from the root down (auto-managed anchor).
    root-hints: "/var/lib/unbound/root.hints"
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: no

    # Reasonable cache + privacy hardening for a home resolver.
    edns-buffer-size: 1232
    prefetch: yes
    num-threads: 1
    so-rcvbuf: 1m

    # Never leak private-range reverse lookups to the internet.
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: 172.16.0.0/12
    private-address: 10.0.0.0/8
    private-address: fd00::/8
    private-address: fe80::/10

    # Do not answer queries from other machines (Pi-hole is the only client).
    access-control: 127.0.0.0/8 allow
    access-control: 0.0.0.0/0 refuse
